name: Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video URL"
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U yt-dlp
          sudo apt-get update
          sudo apt-get install -y rar curl gnupg lsb-release

      - name: Install Cloudflare WARP
        run: |
          curl https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ focal main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      - name: Connect WARP
        run: |
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode proxy
          sudo warp-cli --accept-tos connect

          sleep 15

      - name: Check IP
        run: |
          curl --proxy socks5://127.0.0.1:40000 https://ifconfig.me

      - name: Create folders
        run: |
          mkdir -p downloads
          mkdir -p split

      - name: Download video
        id: download
        shell: bash
        run: |
          yt-dlp \
            --proxy socks5://127.0.0.1:40000 \
            --extractor-args "pornhub:client=android" \
            --add-header "Referer:https://www.pornhub.com/" \
            --add-header "Origin:https://www.pornhub.com" \
            --user-agent "Mozilla/5.0 (Linux; Android 13; SM-S918B) AppleWebKit/537.36 Chrome/124.0.0.0 Mobile Safari/537.36" \
            --force-ipv4 \
            --no-check-certificates \
            --retries 20 \
            --fragment-retries 20 \
            --socket-timeout 30 \
            -f "best[height<=720]" \
            --merge-output-format mp4 \
            -o "downloads/%(title)s.%(ext)s" \
            "${{ github.event.inputs.url }}"

          FILE=$(find downloads -type f | head -n 1)

          if [ ! -f "$FILE" ]; then
            echo "Download failed"
            exit 1
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Split if bigger than 95MB
        shell: bash
        run: |
          FILE="${{ steps.download.outputs.file }}"
          SIZE=$(stat -c%s "$FILE")

          LIMIT=$((95 * 1024 * 1024))

          if [ "$SIZE" -gt "$LIMIT" ]; then

            BASENAME=$(basename "$FILE")

            cd downloads

            rar a -v95m "../split/${BASENAME}.rar" "$BASENAME"

          else

            cp "$FILE" split/

          fi

      - name: Generate tag
        id: tag
        run: |
          echo "tag=release-$(date +%s)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Downloaded Video
          files: split/*
