name: p

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the video'
        required: true
        type: string
      output_folder:
        description: 'Folder where the video will be saved'
        required: false
        type: string
        default: 'downloads'
      quality:
        description: 'Video quality (yt-dlp format selector)'
        required: true
        type: string
        default: 'bestvideo[height<=720]+bestaudio/best[ext=mp4]/best'
      archive_name:
        description: 'Base name for the RAR archive (if file is split)'
        required: false
        type: string
        default: 'video'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download-and-maybe-split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp and bc
        run: |
          pip install -U yt-dlp
          sudo apt-get update
          sudo apt-get install -y bc rar

      - name: Download video
        id: download
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          mkdir -p "$FOLDER"
          touch marker

          URL="${{ github.event.inputs.url }}"
          
          # دانلود با هدرهای کامل برای دور زدن 410
          yt-dlp \
            --output "./$FOLDER/%(uploader)s - %(title)s - %(id)s.%(ext)s" \
            --format "${{ github.event.inputs.quality }}" \
            --merge-output-format mp4 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --add-header "Accept:text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
            --add-header "Accept-Language:en-US,en;q=0.9" \
            --add-header "Referer:https://www.google.com/" \
            --retries 10 \
            --fragment-retries 10 \
            --no-check-certificate \
            --geo-bypass \
            --sleep-interval 2 \
            "$URL" || {
              echo "First attempt failed, trying with proxy..."
              yt-dlp \
                --output "./$FOLDER/%(uploader)s - %(title)s - %(id)s.%(ext)s" \
                --format "${{ github.event.inputs.quality }}" \
                --merge-output-format mp4 \
                --proxy "socks5://184.178.172.5:4145" \
                --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                --retries 10 \
                --no-check-certificate \
                "$URL"
            }

          NEW_FILE=$(find "$FOLDER" -type f -newer marker -print -quit | head -1)
          
          if [ -z "$NEW_FILE" ]; then
            echo "No file was downloaded"
            exit 1
          fi

          FILENAME=$(basename "$NEW_FILE")
          SIZE_BYTES=$(stat -c %s "$NEW_FILE")

          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT
          echo "filepath=$NEW_FILE" >> $GITHUB_OUTPUT

      - name: Split if needed
        run: |
          SIZE_BYTES="${{ steps.download.outputs.size_bytes }}"
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          THRESHOLD_MB=99
          
          COMPARE=$(echo "$SIZE_MB > $THRESHOLD_MB" | bc)
          
          if [ "$COMPARE" -eq 1 ]; then
            FOLDER="${{ github.event.inputs.output_folder }}"
            FILENAME="${{ steps.download.outputs.filename }}"
            cd "$FOLDER"
            RANDOM_HEX=$(openssl rand -hex 3)
            ARCHIVE_NAME="${{ github.event.inputs.archive_name }}_${RANDOM_HEX}"
            rar a -v95m -m5 -ep1 "${ARCHIVE_NAME}.rar" "$FILENAME"
            rm "$FILENAME"
            echo "File was split into parts"
          else
            echo "File size ($SIZE_MB MB) is under threshold, no split needed"
          fi

      - name: Commit and push
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FOLDER/"
          git commit -m "Add downloaded video(s)" || echo "Nothing to commit"
          git push
