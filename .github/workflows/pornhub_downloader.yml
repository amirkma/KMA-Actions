name: p

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the video'
        required: true
        type: string
      output_folder:
        description: 'Folder where the video will be saved'
        required: false
        type: string
        default: 'downloads'
      quality:
        description: 'Video quality'
        required: true
        type: string
        default: 'best[ext=mp4]/best'
      archive_name:
        description: 'Base name for the RAR archive'
        required: false
        type: string
        default: 'video'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install latest yt-dlp
        run: |
          pip install -U yt-dlp
          sudo apt-get update
          sudo apt-get install -y rar

      - name: Download with advanced bypass
        id: download
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          mkdir -p "$FOLDER"
          
          URL="${{ github.event.inputs.url }}"
          
          echo "=== DOWNLOADING: $URL ==="
          
          # روش اول: با extractor-args مخصوص
          yt-dlp \
            --output "$FOLDER/%(title)s.%(ext)s" \
            --format "${{ github.event.inputs.quality }}" \
            --merge-output-format mp4 \
            --extractor-args "generic:no-playlist,generic:no-live" \
            --extractor-args "youtube:skip=webpage" \
            --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15" \
            --add-header "Accept: */*" \
            --add-header "Accept-Language: en-US,en;q=0.9" \
            --add-header "Sec-Fetch-Site: cross-site" \
            --add-header "Sec-Fetch-Mode: navigate" \
            --no-check-certificate \
            --geo-bypass \
            --geo-bypass-country US \
            --no-warnings \
            --verbose \
            "$URL" 2>&1 | tee download.log
          
          # پیدا کردن فایل دانلود شده
          sleep 2
          DOWNLOADED_FILE=$(find "$FOLDER" -type f \( -name "*.mp4" -o -name "*.mkv" -o -name "*.webm" -o -name "*.ts" \) | head -1)
          
          if [ -z "$DOWNLOADED_FILE" ]; then
            # روش دوم: استفاده از curl با کوکی و رفرش
            echo "Trying alternative method with curl..."
            
            # اول HTML صفحه رو بگیر
            curl -L -c cookies.txt -b cookies.txt \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -H "Accept: text/html,application/xhtml+xml" \
              --max-time 30 \
              -o page.html \
              "$URL"
            
            # استخراج لینک‌های ویدیویی از صفحه
            grep -Eo 'https?://[^"]+\.(mp4|m3u8|ts|mkv)' page.html | head -1 > video_url.txt
            
            if [ -s video_url.txt ]; then
              VIDEO_URL=$(cat video_url.txt)
              echo "Found video URL: $VIDEO_URL"
              curl -L -b cookies.txt -o "$FOLDER/video.mp4" "$VIDEO_URL"
              DOWNLOADED_FILE="$FOLDER/video.mp4"
            fi
          fi
          
          if [ -z "$DOWNLOADED_FILE" ] || [ ! -f "$DOWNLOADED_FILE" ]; then
            echo "ERROR: Download failed completely"
            cat download.log
            exit 1
          fi
          
          SIZE=$(stat -c%s "$DOWNLOADED_FILE" 2>/dev/null || stat -f%z "$DOWNLOADED_FILE" 2>/dev/null)
          echo "file=$DOWNLOADED_FILE" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "✅ Downloaded: $DOWNLOADED_FILE ($(($SIZE/1048576)) MB)"

      - name: Split large file
        if: steps.download.outputs.file != ''
        run: |
          FILE="${{ steps.download.outputs.file }}"
          SIZE="${{ steps.download.outputs.size }}"
          SIZE_MB=$((SIZE / 1048576))
          
          if [ $SIZE_MB -gt 99 ]; then
            cd "$(dirname "$FILE")"
            RANDOM_HEX=$(openssl rand -hex 3)
            rar a -v95m -m5 "${RANDOM_HEX}.rar" "$(basename "$FILE")"
            rm "$(basename "$FILE")"
            echo "✅ File split into parts"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Add downloaded content" || echo "No changes"
          git push
