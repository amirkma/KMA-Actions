name: Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video URL"
        required: true
        type: string

      quality:
        description: "Quality"
        required: true
        default: "720"
        type: choice
        options:
          - "360"
          - "480"
          - "720"
          - "1080"
          - "best"

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -U --pre yt-dlp

          sudo apt-get update
          sudo apt-get install -y tor ffmpeg rar

      - name: Start Tor
        run: |
          sudo systemctl start tor
          sleep 10

      - name: Check Tor
        run: |
          curl --socks5-hostname 127.0.0.1:9050 https://check.torproject.org/api/ip -s

      - name: Create folders
        run: |
          mkdir -p downloads
          mkdir -p split
          touch timestamp.txt

      - name: Set quality format
        id: quality
        shell: bash
        run: |
          QUALITY="${{ github.event.inputs.quality }}"

          if [ "$QUALITY" = "best" ]; then
            FORMAT="best[ext=mp4]/best"
          else
            FORMAT="best[height<=${QUALITY}][ext=mp4]/best[height<=${QUALITY}]"
          fi

          echo "format=$FORMAT" >> $GITHUB_OUTPUT

          echo "Using format:"
          echo "$FORMAT"

      - name: Download via Tor
        id: download
        shell: bash
        run: |
          FOLDER="downloads"
          URL="${{ github.event.inputs.url }}"

          echo "Downloading via Tor from: $URL"

          yt-dlp \
            --proxy "socks5://127.0.0.1:9050" \
            --output "$FOLDER/%(title)s.%(ext)s" \
            --format "${{ steps.quality.outputs.format }}" \
            --merge-output-format mp4 \
            --retries 20 \
            --fragment-retries 20 \
            --concurrent-fragments 4 \
            --socket-timeout 30 \
            --no-check-certificate \
            --force-ipv4 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --add-header "Accept-Language: en-US,en;q=0.9" \
            "$URL"

          DOWNLOADED_FILE=$(find "$FOLDER" -type f -newer timestamp.txt ! -name "timestamp.txt" | head -1)

          if [ -z "$DOWNLOADED_FILE" ]; then
            echo "Download failed"
            exit 1
          fi

          echo "file=$DOWNLOADED_FILE" >> $GITHUB_OUTPUT

          echo "Downloaded:"
          echo "$DOWNLOADED_FILE"

      - name: Split large files
        shell: bash
        run: |
          FILE="${{ steps.download.outputs.file }}"

          SIZE=$(stat -c%s "$FILE")

          LIMIT=$((95 * 1024 * 1024))

          if [ "$SIZE" -gt "$LIMIT" ]; then

            BASENAME=$(basename "$FILE")

            cd downloads

            rar a -v95m "../split/${BASENAME}.rar" "$BASENAME"

          else

            cp "$FILE" split/

          fi

      - name: Generate release tag
        id: tag
        run: |
          echo "tag=release-$(date +%s)" >> $GITHUB_OUTPUT

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Downloaded Video
          files: split/*
