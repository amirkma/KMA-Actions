name: KMA Downloader Pro with Tor

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یا فایل'
        required: true
        type: string
      output_folder:
        description: 'پوشه ذخیره'
        required: false
        type: string
        default: 'downloads'
      adult_content:
        description: 'محتوای بزرگسالان'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  download-with-tor:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp and Tor
        run: |
          pip install -U yt-dlp
          sudo apt-get update
          sudo apt-get install -y tor rar
          sudo service tor start
          # صبر برای راه‌اندازی کامل Tor
          sleep 10

      - name: Prepare folder
        run: |
          if [ "${{ github.event.inputs.adult_content }}" = "true" ]; then
            FOLDER="adult_${{ github.event.inputs.output_folder }}"
          else
            FOLDER="${{ github.event.inputs.output_folder }}"
          fi
          mkdir -p "$FOLDER"
          echo "FOLDER=$FOLDER" >> $GITHUB_ENV
          date > timestamp.txt

      - name: Download via Tor
        id: download
        run: |
          FOLDER="${{ env.FOLDER }}"
          URL="${{ github.event.inputs.url }}"
          
          echo "Downloading via Tor from: $URL"
          
          # بررسی وضعیت Tor
          curl --socks5-hostname 127.0.0.1:9050 https://check.torproject.org/api/ip -s | grep -q "IsTor" && echo "✅ Tor is working" || echo "⚠️ Tor check failed"
          
          # دانلود با پروکسی Tor
          yt-dlp \
            --proxy "socks5://127.0.0.1:9050" \
            --output "$FOLDER/%(title)s.%(ext)s" \
            --format "best[ext=mp4]/best" \
            --merge-output-format mp4 \
            --retries 10 \
            --fragment-retries 10 \
            --no-check-certificate \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --add-header "Accept-Language: en-US,en;q=0.9" \
            "$URL"
          
          # پیدا کردن فایل دانلود شده
          DOWNLOADED_FILE=$(find "$FOLDER" -type f -newer timestamp.txt ! -name "timestamp.txt" 2>/dev/null | head -1)
          
          if [ -n "$DOWNLOADED_FILE" ]; then
            echo "file=$DOWNLOADED_FILE" >> $GITHUB_OUTPUT
            echo "✅ Downloaded via Tor: $DOWNLOADED_FILE"
          else
            echo "⚠️ Download may have failed"
          fi

      - name: Split if needed
        if: steps.download.outputs.file != ''
        run: |
          FILE="${{ steps.download.outputs.file }}"
          if [ -f "$FILE" ]; then
            SIZE=$(stat -c%s "$FILE")
            SIZE_MB=$((SIZE / 1048576))
            if [ $SIZE_MB -gt 95 ]; then
              cd "$(dirname "$FILE")"
              RAND_NAME=$(openssl rand -hex 3)
              rar a -v95m -m5 "${RAND_NAME}.rar" "$(basename "$FILE")"
              rm "$(basename "$FILE")"
            fi
          fi

      - name: Commit and push
        run: |
          git config user.name "KMA Bot"
          git config user.email "bot@kma.local"
          git add .
          git commit -m "Download via Tor: ${{ github.event.inputs.url }}" || echo "Nothing to commit"
          git push || echo "Nothing to push"
