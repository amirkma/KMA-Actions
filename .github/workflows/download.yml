name: KMA Downloader Pro

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یا فایل'
        required: true
        type: string
      output_folder:
        description: 'پوشه ذخیره'
        required: false
        type: string
        default: 'downloads'
      quality:
        description: 'کیفیت'
        required: false
        type: choice
        default: 'best'
        options:
          - 'best'
          - 'bestvideo[height<=720]+bestaudio'
          - 'bestvideo[height<=1080]+bestaudio'
      use_proxy:
        description: 'استفاده از پروکسی'
        required: false
        type: boolean
        default: true
      adult_content:
        description: 'محتوای بزرگسالان'
        required: false
        type: boolean
        default: false
      max_size_mb:
        description: 'حداکثر حجم هر فایل (MB)'
        required: false
        type: number
        default: 95

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          pip install yt-dlp
          sudo apt-get update
          sudo apt-get install -y rar

      - name: Prepare folder
        run: |
          if [ "${{ github.event.inputs.adult_content }}" = "true" ]; then
            FOLDER="adult_${{ github.event.inputs.output_folder }}"
          else
            FOLDER="${{ github.event.inputs.output_folder }}"
          fi
          mkdir -p "$FOLDER"
          echo "FOLDER=$FOLDER" >> $GITHUB_ENV
          touch marker.txt

      - name: Download video
        id: download
        run: |
          FOLDER="${{ env.FOLDER }}"
          URL="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          echo "Downloading from: $URL"
          echo "Saving to: $FOLDER"
          
          # تلاش با روش‌های مختلف
          if yt-dlp \
            --output "$FOLDER/%(title)s.%(ext)s" \
            --format "$QUALITY" \
            --merge-output-format mp4 \
            --retries 5 \
            --no-check-certificate \
            --geo-bypass \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "$URL"; then
            echo "Download successful"
          else
            # تلاش دوم با پروکسی
            if [ "${{ github.event.inputs.use_proxy }}" = "true" ]; then
              yt-dlp \
                --output "$FOLDER/%(title)s.%(ext)s" \
                --format "$QUALITY" \
                --merge-output-format mp4 \
                --retries 10 \
                --proxy "http://us.proxy.webshare.io:80" \
                --user-agent "Mozilla/5.0" \
                "$URL"
            else
              exit 1
            fi
          fi
          
          # پیدا کردن فایل دانلود شده
          DOWNLOADED_FILE=$(find "$FOLDER" -type f -newer marker.txt 2>/dev/null | head -1)
          if [ -n "$DOWNLOADED_FILE" ]; then
            echo "file=$DOWNLOADED_FILE" >> $GITHUB_OUTPUT
            SIZE=$(stat -c%s "$DOWNLOADED_FILE")
            echo "size=$SIZE" >> $GITHUB_OUTPUT
            echo "✅ Downloaded: $DOWNLOADED_FILE"
          fi

      - name: Split if needed
        if: steps.download.outputs.file != ''
        run: |
          FILE="${{ steps.download.outputs.file }}"
          SIZE_MB=$(echo "scale=2; ${{ steps.download.outputs.size }} / 1048576" | bc)
          THRESHOLD=${{ github.event.inputs.max_size_mb }}
          
          if (( $(echo "$SIZE_MB > $THRESHOLD" | bc -l) )); then
            echo "File is ${SIZE_MB}MB, splitting into ${THRESHOLD}MB parts..."
            cd "$(dirname "$FILE")"
            RAND_NAME=$(openssl rand -hex 3)
            rar a -v${THRESHOLD}m -m5 "${RAND_NAME}.rar" "$(basename "$FILE")"
            rm "$(basename "$FILE")"
            echo "✅ Split complete"
          fi

      - name: Commit and push
        run: |
          git config user.name "KMA Bot"
          git config user.email "bot@kma.local"
          git add .
          git commit -m "Download: ${{ github.event.inputs.url }}" || echo "Nothing to commit"
          git push || echo "Nothing to push"
